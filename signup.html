<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8">
    <title>DevCom · Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ==================== 🔧 请替换为您的 Firebase 配置（与 login 相同）====================
        const firebaseConfig = {
    apiKey: "AIzaSyCORVbbfcZ-xe_bqepFTFkz6QUIQ5pBxnA",
    authDomain: "devcom-405e9.firebaseapp.com",
    projectId: "devcom-405e9",
    storageBucket: "devcom-405e9.firebasestorage.app",
    messagingSenderId: "37654914337",
    appId: "1:37654914337:web:7d57cd9b8d206c277a8a60",
    measurementId: "G-P679DYRYXK"
  };
        // ====================================================================

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const signupForm = document.getElementById('signupForm');
        const usernameInput = document.getElementById('username');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const errorMsg = document.getElementById('errorMsg');
        const loadingSpinner = document.getElementById('loadingSpinner');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = usernameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirm = confirmInput.value;

            if (!username || !email || !password || !confirm) {
                showError('All fields are required.');
                return;
            }
            if (password !== confirm) {
                showError('Passwords do not match.');
                return;
            }
            if (password.length < 6) {
                showError('Password must be at least 6 characters.');
                return;
            }

            loadingSpinner.classList.remove('hidden');
            errorMsg.classList.add('hidden');

            try {
                // 1. 创建 Firebase Auth 用户
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. 在 Firestore 中保存用户资料（用户名、邮箱等）
                await setDoc(doc(db, "users", user.uid), {
                    username: username,
                    email: email,
                    createdAt: new Date().toISOString()
                });

                // 3. 注册成功，跳转到登录页面
                alert('Account created successfully! Please log in.');
                window.location.href = 'login.html';
            } catch (error) {
                console.error("Signup error:", error);
                let message = "Registration failed: ";
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        message = "This email is already registered.";
                        break;
                    case 'auth/invalid-email':
                        message = "Invalid email address.";
                        break;
                    case 'auth/weak-password':
                        message = "Password is too weak.";
                        break;
                    default:
                        message += error.message;
                }
                showError(message);
            } finally {
                loadingSpinner.classList.add('hidden');
            }
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 30% 40%, #070b1a, #01010c);
            min-height: 100vh;
            display: flex;
            color:white;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }
        #star-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .signup-container {
            position: relative;
            z-index: 2;
            background: rgba(12, 22, 40, 0.7);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            border: 1px solid rgba(72, 160, 255, 0.4);
            padding: 2.5rem;
            width: 100%;
            max-width: 460px;
            animation: fadeUp 0.7s ease-out;
        }
        .logo h1 {
            font-size: 2.5rem;
            background: linear-gradient(125deg, #ffffff, #7ad0ff, #a07eff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        h2 { text-align: center; margin-bottom: 1.5rem; color: #e2ecff; }
        .input-group { margin-bottom: 1rem; position: relative; }
        .input-group i {
            position: absolute;
            left: 1rem;
            top: 1rem;
            color: #6bc8ff;
        }
        input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            background: rgba(25, 35, 60, 0.8);
            border: 1px solid #2f5a8c;
            border-radius: 1.2rem;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: #6bc8ff; box-shadow: 0 0 6px rgba(107,200,255,0.4); }
        button {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(95deg, #2b6ef0, #9a4dff);
            border: none;
            border-radius: 2rem;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            margin-top: 0.8rem;
        }
        .error {
            background: rgba(220, 50, 70, 0.2);
            border-left: 4px solid #ff5c7a;
            padding: 0.7rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            color: #ffb3c1;
        }
        .hidden { display: none; }
        .spinner { text-align: center; margin: 0.5rem 0; color: #7ad0ff; }
        .footer-link { text-align: center; margin-top: 1.5rem; }
        .footer-link a { color: #8bcbff; text-decoration: none; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<canvas id="star-canvas"></canvas>
<div class="signup-container">
    <div class="logo"><h1>DevCom</h1></div>
    <h2><i class="fas fa-user-plus"></i> Create Account</h2>
    <form id="signupForm">
        <div class="input-group"><i class="fas fa-user"></i><input type="text" id="username" placeholder="Username" autocomplete="off"></div>
        <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="Email address" autocomplete="email"></div>
        <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="Password (min. 6 chars)"></div>
        <div class="input-group"><i class="fas fa-check-circle"></i><input type="password" id="confirmPassword" placeholder="Confirm password"></div>
        <div id="errorMsg" class="error hidden"></div>
        <div id="loadingSpinner" class="spinner hidden"><i class="fas fa-circle-notch fa-spin"></i> Creating account...</div>
        <button type="submit"><i class="fas fa-user-check"></i> Sign Up</button>
    </form>
    <div class="footer-link">
        Already have an account? <a href="login.html">Log in</a> &nbsp;|&nbsp;
        <a href="index.html">← Back to Home</a>
    </div>
</div>

<script>
    // 星空背景 (同上)
    const canvas = document.getElementById('star-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initStars(); }
    function initStars() { stars = []; for(let i=0;i<280;i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, radius: Math.random()*2+0.6, alpha: Math.random()*0.6+0.2, speed: 0.003+Math.random()*0.01, phase: Math.random()*Math.PI*2 }); }
    function drawStars() { if(!ctx) return; ctx.clearRect(0,0,canvas.width,canvas.height); const grad=ctx.createLinearGradient(0,0,canvas.width*0.8,canvas.height); grad.addColorStop(0,'#02030c'); grad.addColorStop(1,'#050b18'); ctx.fillStyle=grad; ctx.fillRect(0,0,canvas.width,canvas.height); const time=Date.now()*0.002; for(let s of stars){ const twinkle=Math.sin(time*s.speed*2+s.phase)*0.3+0.6; const alphaVal=Math.min(0.9,s.alpha*twinkle); ctx.beginPath(); ctx.arc(s.x,s.y,s.radius,0,Math.PI*2); ctx.fillStyle=`rgba(255,240,210,${alphaVal})`; ctx.fill(); } requestAnimationFrame(drawStars); }
    window.addEventListener('resize',()=>{ resizeCanvas(); });
    resizeCanvas(); drawStars();
</script>
</body>
</html>
