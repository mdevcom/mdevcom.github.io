<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8">
    <title>DevCom · Login</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Firebase SDKs (v9 modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ==================== 🔧 请替换为您的 Firebase 配置 ====================
        const firebaseConfig = {
    apiKey: "AIzaSyCORVbbfcZ-xe_bqepFTFkz6QUIQ5pBxnA",
    authDomain: "devcom-405e9.firebaseapp.com",
    projectId: "devcom-405e9",
    storageBucket: "devcom-405e9.firebasestorage.app",
    messagingSenderId: "37654914337",
    appId: "1:37654914337:web:7d57cd9b8d206c277a8a60",
    measurementId: "G-P679DYRYXK"
  };
        // ====================================================================

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // DOM 元素
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMsg');
        const loadingSpinner = document.getElementById('loadingSpinner');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Please fill in both fields.');
                return;
            }

            // 显示加载状态
            loadingSpinner.classList.remove('hidden');
            errorMsg.classList.add('hidden');

            try {
                // 1. 使用 Firebase Auth 验证用户
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. （可选）从 Firestore 获取用户资料（如显示名称）
                const userDoc = await getDoc(doc(db, "users", user.uid));
                let username = email; // 默认使用邮箱作为用户名标识
                if (userDoc.exists() && userDoc.data().username) {
                    username = userDoc.data().username;
                }

                // 3. 重定向到 dashboard，并携带 username 和 password (需求要求)
                // ⚠️ 注意：实际生产环境不建议明文传递密码，此处按需求实现
                const dashboardUrl = `dashboard.html?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`;
                window.location.href = dashboardUrl;

            } catch (error) {
                console.error("Login error:", error);
                let message = "Login failed. ";
                switch (error.code) {
                    case 'auth/user-not-found':
                        message = "No user found with this email.";
                        break;
                    case 'auth/wrong-password':
                        message = "Incorrect password.";
                        break;
                    case 'auth/invalid-email':
                        message = "Invalid email format.";
                        break;
                    default:
                        message += error.message;
                }
                showError(message);
            } finally {
                loadingSpinner.classList.add('hidden');
            }
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 30% 40%, #070b1a, #01010c);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }
        /* 星空画布 */
        #star-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .login-container {
            position: relative;
            z-index: 2;
            background: rgba(12, 22, 40, 0.7);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            border: 1px solid rgba(72, 160, 255, 0.4);
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: fadeUp 0.7s ease-out;
        }
        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .logo h1 {
            font-size: 2.5rem;
            background: linear-gradient(125deg, #ffffff, #7ad0ff, #a07eff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        h2 {
            text-align: center;
            margin-bottom: 1.8rem;
            font-weight: 600;
            color: #e2ecff;
        }
        .input-group {
            margin-bottom: 1.2rem;
        }
        .input-group i {
            position: absolute;
            margin-left: 1rem;
            margin-top: 1rem;
            color: #6bc8ff;
        }
        input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            background: rgba(25, 35, 60, 0.8);
            border: 1px solid #2f5a8c;
            border-radius: 1.2rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        input:focus {
            border-color: #6bc8ff;
            box-shadow: 0 0 8px rgba(107,200,255,0.4);
        }
        button {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(95deg, #2b6ef0, #9a4dff);
            border: none;
            border-radius: 2rem;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(43,110,240,0.5);
        }
        .error {
            background: rgba(220, 50, 70, 0.2);
            border-left: 4px solid #ff5c7a;
            padding: 0.7rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            color: #ffb3c1;
            font-size: 0.85rem;
        }
        .hidden {
            display: none;
        }
        .spinner {
            text-align: center;
            margin: 0.5rem 0;
            color: #7ad0ff;
        }
        .footer-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
        .footer-link a {
            color: #8bcbff;
            text-decoration: none;
        }
        .footer-link a:hover {
            text-decoration: underline;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<canvas id="star-canvas"></canvas>
<div class="login-container">
    <div class="logo"><h1>DevCom</h1></div>
    <h2><i class="fas fa-sign-in-alt"></i> Login</h2>
    <form id="loginForm">
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="Email address" required autocomplete="email">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
        </div>
        <div id="errorMsg" class="error hidden"></div>
        <div id="loadingSpinner" class="spinner hidden"><i class="fas fa-circle-notch fa-spin"></i> Authenticating...</div>
        <button type="submit"><i class="fas fa-arrow-right-to-bracket"></i> Log in</button>
    </form>
    <div class="footer-link">
        Don't have an account? <a href="signup.html">Sign up now</a> &nbsp;|&nbsp;
        <a href="index.html">← Back to Home</a>
    </div>
</div>

<script>
    // 星空动画 (与之前主页一致)
    const canvas = document.getElementById('star-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initStars();
    }
    function initStars() {
        stars = [];
        for (let i = 0; i < 280; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2 + 0.6,
                alpha: Math.random() * 0.6 + 0.2,
                speed: 0.003 + Math.random() * 0.01,
                phase: Math.random() * Math.PI * 2
            });
        }
    }
    function drawStars() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const grad = ctx.createLinearGradient(0,0,canvas.width*0.8,canvas.height);
        grad.addColorStop(0,'#02030c');
        grad.addColorStop(1,'#050b18');
        ctx.fillStyle = grad;
        ctx.fillRect(0,0,canvas.width,canvas.height);
        const time = Date.now() * 0.002;
        for (let s of stars) {
            const twinkle = Math.sin(time * s.speed * 2 + s.phase) * 0.3 + 0.6;
            const alphaVal = Math.min(0.9, s.alpha * twinkle);
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255, 240, 210, ${alphaVal})`;
            ctx.fill();
        }
        requestAnimationFrame(drawStars);
    }
    window.addEventListener('resize', () => { resizeCanvas(); });
    resizeCanvas();
    drawStars();
</script>
</body>
</html>
